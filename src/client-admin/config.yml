# Client CMS — content editing only.
# Brand colors, backend settings, and structural config are NOT exposed here.
# For full agency access, use /admin/

backend:
  name: git-gateway
  repo: YOUR_ORG/YOUR_REPO
  branch: main
  # Uncomment and fill in DecapBridge PKCE auth values:
  # auth_type: pkce
  # base_url: https://auth.decapbridge.com
  # auth_endpoint: /sites/YOUR_SITE_ID/pkce
  # auth_token_endpoint: /sites/YOUR_SITE_ID/token
  # gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via CMS
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via CMS
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via CMS
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via CMS
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via CMS

local_backend: true

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
    # ── Alert Banner ───────────────────────────────────────────────────────────
    - name: "alert"
      label: "Alert Banner"
      editor:
          preview: false
      files:
          - name: "alert"
            label: "Alert Banner"
            file: "src/_data/alert.json"
            fields:
                - { label: "Enable Banner", name: "enabled", widget: "boolean", default: false }
                - {
                      label: "Message",
                      name: "text",
                      widget: "string",
                      required: false,
                      hint: "The message shown in the banner across the top of the site.",
                  }
                - {
                      label: "Start Date",
                      name: "startDate",
                      widget: "datetime",
                      required: false,
                      date_format: "YYYY-MM-DD",
                      time_format: false,
                      hint: "Leave blank to show immediately when enabled.",
                  }
                - {
                      label: "End Date",
                      name: "endDate",
                      widget: "datetime",
                      required: false,
                      date_format: "YYYY-MM-DD",
                      time_format: false,
                      hint: "Leave blank to show indefinitely.",
                  }

    # ── Site Content ──────────────────────────────────────────────────────────
    - name: "content"
      label: "Site Content"
      editor:
          preview: false
      files:
          # ── Contact Info ──────────────────────────────────────────────────
          - name: "contact"
            label: "Contact Info"
            file: "src/_data/contact.json"
            fields:
                - {
                      label: "Email Address",
                      name: "email",
                      widget: "string",
                      hint: "Business email shown in the footer.",
                  }
                - {
                      label: "Phone Number",
                      name: "phoneForTel",
                      widget: "string",
                      hint: "Digits and dashes only. Example: 505-555-0100",
                  }

          # ── Location & Maps ───────────────────────────────────────────────
          - name: "location"
            label: "Location & Maps"
            file: "src/_data/location.json"
            fields:
                - { label: "Street Address", name: "address", widget: "string" }
                - { label: "City", name: "city", widget: "string" }
                - { label: "State", name: "state", widget: "string", hint: "Two-letter abbreviation." }
                - { label: "ZIP Code", name: "zip", widget: "string" }
                - { label: "Country Code", name: "country", widget: "string", default: "US" }
                - {
                      label: "Google Maps Link",
                      name: "mapLink",
                      widget: "string",
                      hint: "Full Google Maps URL for your business location.",
                  }

          # ── Business Hours ────────────────────────────────────────────────
          - name: "hours"
            label: "Business Hours"
            file: "src/_data/hours.json"
            fields:
                - { label: "Weekday Hours", name: "hoursWeekdays", widget: "string" }
                - { label: "Weekend Hours", name: "hoursWeekend", widget: "string" }

          # ── Hero ───────────────────────────────────────────────────────────
          - name: "hero"
            label: "Hero Section"
            file: "src/_data/hero.json"
            fields:
                - {
                      label: "Hero Image",
                      name: "heroImage",
                      widget: "image",
                      hint: "Main hero image on the homepage.",
                  }
                - {
                      label: "Tagline",
                      name: "heroTagline",
                      widget: "string",
                      hint: "Short tagline — your business name or key phrase.",
                  }
                - {
                      label: "Subtitle",
                      name: "heroSubtitle",
                      widget: "string",
                      hint: "One sentence describing what you do and who you serve.",
                  }

    # ── Testimonials ─────────────────────────────────────────────────────────
    - name: "testimonials"
      label: "Testimonials"
      editor:
          preview: false
      files:
          - name: "testimonials"
            label: "Customer Reviews"
            file: "src/_data/testimonials.json"
            fields:
                - label: "Reviews"
                  name: "items"
                  widget: "list"
                  fields:
                      - { label: "Review Text", name: "text", widget: "text" }
                      - { label: "Author Name", name: "author", widget: "string" }
                      - { label: "Initials", name: "initials", widget: "string", hint: "Two letters shown in avatar circle" }
                      - { label: "Role", name: "role", widget: "string", default: "Verified Customer" }
                      - { label: "Rating", name: "rating", widget: "number", default: 5, value_type: "int", min: 1, max: 5 }
                      - { label: "Source", name: "source", widget: "select", options: ["Google", "Yelp", "Facebook"], default: "Google" }
                      - { label: "Review URL", name: "url", widget: "string", required: false, hint: "Link to the original review" }

    # ── Trust Bar ────────────────────────────────────────────────────────────
    - name: "trustbar"
      label: "Trust Bar"
      editor:
          preview: false
      files:
          - name: "trustbar"
            label: "Stats"
            file: "src/_data/trustbar.json"
            fields:
                - label: "Stats"
                  name: "items"
                  widget: "list"
                  fields:
                      - { label: "Number / Value", name: "number", widget: "string", hint: "e.g. 15+, 4.9/5, 2.4k" }
                      - { label: "Label", name: "label", widget: "string", hint: "e.g. Years Local, Rating, Homes Served" }

    # ── Services ─────────────────────────────────────────────────────────────
    - name: "services"
      label: "Services"
      folder: "src/content/services"
      create: true
      delete: true
      editor:
          preview: false
      fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Image", name: "beforeImage", widget: "image" }
          - {
                label: "After Image (optional)",
                name: "afterImage",
                widget: "image",
                required: false,
                hint: "If provided, hovering the card swaps to this image.",
            }
          - { label: "Display Order", name: "order", widget: "number", default: 1, hint: "Lower = appears first." }
