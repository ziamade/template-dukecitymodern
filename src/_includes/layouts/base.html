<!-- A fully fleshed-out <head>, dynamically changing based on client.json and the page front matter -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Standard meta tags -->
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="{{ description }}">
        <link rel="canonical" href="{{ client.domain }}{{ page.url }}">
        <meta name="generator" content="{{ eleventy.generator }}">

        <!--Social Media Display-->
        <meta property="og:title" content="{{ title }}"/>
        <meta property="og:description" content="{{ description }}"/>
        <meta property="og:type" content="website"/>
        <meta property="og:url" content="{{ client.domain }}{{ page.url }}"/>
        <meta property="og:image" content="{{ image or "/assets/images/logo-small.png" }}"/>
        <meta property="og:image:secure_url" content="{{ image or "/assets/images/logo-small.png" }}"/>

        <!--Favicons-->
        <!-- https://realfavicongenerator.net/ -->
        <link rel="icon" type="image/png" href="/assets/favicons/favicon-96x96.png" sizes="96x96"/>
        <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg"/>
        <link rel="shortcut icon" href="/assets/favicons/favicon.ico"/>
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png"/>
        <meta name="apple-mobile-web-app-title" content="Starter Kit"/>
        <link rel="manifest" href="/assets/favicons/site.webmanifest"/>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

        <!-- Sitewide Stylesheets and Scripts -->
        <link rel="stylesheet" href="/assets/css/root.css">
        <script defer src="/assets/js/nav.js"></script>

        <!-- Brand color overrides from brand.json -->
        <style>
            :root {
                --primary: {{ brand.primary }};
                --primaryLight: {{ brand.primaryLight }};
                --secondary: {{ brand.secondary }};
                --secondaryLight: {{ brand.secondaryLight }};
                --accent: {{ brand.accent }};
                --headerColor: {{ brand.headerColor }};
                --bodyTextColor: {{ brand.bodyTextColor }};
                --bodyTextColorWhite: {{ brand.bodyTextColorWhite }};
                --off-white: {{ brand.offWhite }};
                --cream: {{ brand.cream }};
                --dark: {{ brand.dark }};
                --midnight: {{ brand.dark }};
                --medium: {{ brand.medium }};
                --deep-brown: {{ brand.medium }};
                --accent-dark: {{ brand.accentDark }};
                --silver: {{ brand.silver }};
            }
        </style>

        {% block head %}{% endblock %}

        <title>{{ title }}</title>
    </head>
    <body>
        <!--Screen reader skip main nav-->
        <a class="skip" aria-label="skip to main content" href="#main">Click To Skip To Main Content</a>

        {% include "sections/header.html" %}

        {% if alert.enabled and alert.text %}
        <div id="site-alert"
             data-start="{{ alert.startDate }}"
             data-end="{{ alert.endDate }}"
             role="alert"
             style="display:none">
            <span class="site-alert-text">{{ alert.text }}</span>
            <button class="site-alert-close" aria-label="Close announcement">&#10005;</button>
        </div>
        <script>
            (function () {
                var el = document.getElementById('site-alert');
                if (!el) return;
                var now = new Date();
                var start = el.dataset.start ? new Date(el.dataset.start.slice(0, 10) + 'T00:00:00') : null;
                var end = el.dataset.end ? new Date(el.dataset.end.slice(0, 10) + 'T23:59:59') : null;
                var hero = document.querySelector('.hero');
                var heroBasePt = hero ? parseInt(window.getComputedStyle(hero).paddingTop) : 0;
                var applyBannerOffset = function () {
                    var bannerH = el.offsetHeight;
                    var header = document.querySelector('header');
                    if (header) header.style.top = bannerH + 'px';
                    if (hero) hero.style.paddingTop = (heroBasePt + bannerH) + 'px';
                };
                if ((!start || now >= start) && (!end || now <= end)) {
                    el.style.display = '';
                    applyBannerOffset();
                    window.addEventListener('resize', applyBannerOffset);
                }
                el.querySelector('.site-alert-close').addEventListener('click', function () {
                    el.style.display = 'none';
                    var header = document.querySelector('header');
                    if (header) header.style.top = '';
                    if (hero) hero.style.paddingTop = '';
                    window.removeEventListener('resize', applyBannerOffset);
                });
            })();
        </script>
        {% endif %}

        <main id="main">
            {% block body %}{% endblock %}
        </main>
        {% include "sections/footer.html" %}

        <!-- Mobile FAB: click-to-call, hidden on desktop -->
        <a href="tel:{{ contact.phoneForTel }}" class="mobile-fab" aria-label="Call {{ contact.phoneForTel | formatPhone }}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
        </a>

    </body>
</html>
