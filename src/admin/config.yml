# Replace the "backend" object below with the snippet from DecapBridge for your project.
# We need something here to get the CMS to work locally, but this alone won't work in production.
# See: https://decapbridge.com for setup instructions.
backend:
  name: git-gateway
  repo: YOUR_ORG/YOUR_REPO
  branch: main
  # Uncomment and fill in DecapBridge PKCE auth values:
  # auth_type: pkce
  # base_url: https://auth.decapbridge.com
  # auth_endpoint: /sites/YOUR_SITE_ID/pkce
  # auth_token_endpoint: /sites/YOUR_SITE_ID/token
  # gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
# site_url: https://your-site.pages.dev/admin

# Keep this to allow you to edit the cms locally
local_backend: true

media_folder: "src/assets/images"
public_folder: "/assets/images"

# Decap CMS Collections
collections:
    # ── Alert Banner ───────────────────────────────────────────────────────────
    - name: "alert"
      label: "Alert Banner"
      editor:
          preview: false
      files:
          - name: "alert"
            label: "Alert Banner"
            file: "src/_data/alert.json"
            fields:
                - { label: "Enable Banner", name: "enabled", widget: "boolean", default: false }
                - {
                      label: "Message",
                      name: "text",
                      widget: "string",
                      required: false,
                      hint: "The message shown in the banner across the top of the site.",
                  }
                - {
                      label: "Start Date",
                      name: "startDate",
                      widget: "datetime",
                      required: false,
                      date_format: "YYYY-MM-DD",
                      time_format: false,
                      hint: "Leave blank to show immediately when enabled.",
                  }
                - {
                      label: "End Date",
                      name: "endDate",
                      widget: "datetime",
                      required: false,
                      date_format: "YYYY-MM-DD",
                      time_format: false,
                      hint: "Leave blank to show indefinitely.",
                  }

    # ── Site Settings ─────────────────────────────────────────────────────────
    - name: "settings"
      label: "Site Settings"
      editor:
          preview: false
      files:
          # ── Contact Info ──────────────────────────────────────────────────
          - name: "contact"
            label: "Contact Info"
            file: "src/_data/contact.json"
            fields:
                - {
                      label: "Email Address",
                      name: "email",
                      widget: "string",
                      hint: "Business email shown in the footer and contact section.",
                  }
                - {
                      label: "Phone Number",
                      name: "phoneForTel",
                      widget: "string",
                      hint: "Used for click-to-call links and formatted as (555) 555-5555. Digits and dashes only.",
                  }

          # ── Location & Maps ───────────────────────────────────────────────
          - name: "location"
            label: "Location & Maps"
            file: "src/_data/location.json"
            fields:
                - { label: "Street Address", name: "address", widget: "string" }
                - { label: "City", name: "city", widget: "string" }
                - { label: "State", name: "state", widget: "string", hint: "Two-letter state abbreviation." }
                - { label: "ZIP Code", name: "zip", widget: "string" }
                - { label: "Country Code", name: "country", widget: "string", default: "US" }
                - {
                      label: "Google Maps Link",
                      name: "mapLink",
                      widget: "string",
                      hint: "Full Google Maps URL for your business location.",
                  }

          # ── Business Hours ────────────────────────────────────────────────
          - name: "hours"
            label: "Business Hours"
            file: "src/_data/hours.json"
            fields:
                - { label: "Weekday Hours", name: "hoursWeekdays", widget: "string" }
                - { label: "Weekend Hours", name: "hoursWeekend", widget: "string" }

          # ── Hero ───────────────────────────────────────────────────────────
          - name: "hero"
            label: "Hero Section"
            file: "src/_data/hero.json"
            fields:
                - {
                      label: "Hero Image",
                      name: "heroImage",
                      widget: "image",
                      hint: "Main hero image displayed on the homepage.",
                  }
                - {
                      label: "Tagline",
                      name: "heroTagline",
                      widget: "string",
                      hint: "Short tagline displayed above the main heading.",
                  }
                - {
                      label: "Subtitle",
                      name: "heroSubtitle",
                      widget: "string",
                      hint: "Descriptive text below the main heading.",
                  }

    # ── Testimonials ─────────────────────────────────────────────────────────
    - name: "testimonials"
      label: "Testimonials"
      editor:
          preview: false
      files:
          - name: "testimonials"
            label: "Customer Reviews"
            file: "src/_data/testimonials.json"
            fields:
                - label: "Reviews"
                  name: "items"
                  widget: "list"
                  fields:
                      - { label: "Review Text", name: "text", widget: "text" }
                      - { label: "Author Name", name: "author", widget: "string" }
                      - { label: "Initials", name: "initials", widget: "string", hint: "Two letters shown in avatar circle" }
                      - { label: "Role", name: "role", widget: "string", default: "Verified Customer" }
                      - { label: "Rating", name: "rating", widget: "number", default: 5, value_type: "int", min: 1, max: 5 }
                      - { label: "Source", name: "source", widget: "select", options: ["Google", "Yelp", "Facebook"], default: "Google" }
                      - { label: "Review URL", name: "url", widget: "string", required: false, hint: "Link to the original review" }

    # ── Trust Bar ────────────────────────────────────────────────────────────
    - name: "trustbar"
      label: "Trust Bar"
      editor:
          preview: false
      files:
          - name: "trustbar"
            label: "Trust Bar Stats"
            file: "src/_data/trustbar.json"
            fields:
                - label: "Stats"
                  name: "items"
                  widget: "list"
                  fields:
                      - { label: "Number/Value", name: "number", widget: "string" }
                      - { label: "Label", name: "label", widget: "string" }

    # ── Services ──────────────────────────────────────────────────────────────
    - name: "services"
      label: "Services"
      editor:
          preview: false
      folder: "src/content/services"
      create: true
      slug: "{{order}}-{{slug}}"
      media_folder: "/src/assets/images/services"
      public_folder: "/assets/images/services"
      fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Image", name: "beforeImage", widget: "image" }
          - {
                label: "Hover Image (optional)",
                name: "afterImage",
                widget: "image",
                required: false,
                hint: "If provided, the card will show this image on hover.",
            }
          - {
                label: "Display Order",
                name: "order",
                widget: "number",
                default: 1,
                hint: "Lower numbers appear first (1 = first card).",
            }
